    <style>
        :root {
            --bg-color: #0f0f0f;
            --purple-dark: #1f0b3b;
            --purple-glow: rgba(62, 22, 117, 0.5);
            --cta-green: #25D366; 
            --cta-green-hover: #1EBE5D;
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            width: 100%;
        }

        .fade-in {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
        }

        .fade-in.visible { opacity: 1; transform: translateY(0); }

        .cta-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            max-width: 400px;
            background-color: var(--cta-green);
            color: white;
            font-weight: 800;
            font-size: 1.1rem;
            text-align: center;
            padding: 18px 24px;
            border-radius: 8px;
            text-decoration: none;
            transition: all 0.4s ease;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 40px;
        }

        .cta-button.disabled {
            background-color: #333 !important;
            color: #777 !important;
            cursor: not-allowed !important;
            pointer-events: none;
            opacity: 0.6;
        }

        .cta-button:hover:not(.disabled) {
            background-color: var(--cta-green-hover);
            transform: scale(1.02);
            box-shadow: 0 6px 20px rgba(37, 211, 102, 0.4);
        }

        .cta-button svg { width: 24px; height: 24px; fill: currentColor; }

        .thank-you-section {
            padding: 40px 0; 
            text-align: center;
            background: radial-gradient(circle at top, var(--purple-dark) 0%, var(--bg-color) 70%);
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .brand-logo {
            max-height: 70px;
            width: auto;
            margin-bottom: 20px; 
            display: inline-block;
        }

        .thank-you-section h1 {
            font-size: 2rem;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 12px; 
            background: linear-gradient(to right, #fff, #d8b4fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .thank-you-section p.subtitle {
            font-size: 1rem;
            color: var(--text-muted);
            line-height: 1.5;
            margin-bottom: 30px;
            max-width: 500px;
        }

        .highlight-text { color: #fff; font-weight: 600; }

        /* --- O FIX DO VÍDEO (XÔ BARRAS PRETAS) --- */
        .video-container {
            position: relative;
            /* Reduzimos a proporção para "cortar" as barras de cima e baixo */
            padding-bottom: 155%; 
            height: 0;
            overflow: hidden;
            width: 100%;
            max-width: 320px; 
            background: #000;
            border-radius: 16px;
            margin: 0 auto 35px auto;
            border: 2px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 40px var(--purple-glow);
        }

        .video-container iframe {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100%;
            height: 105%; /* Um pouco maior para garantir que as bordas sumam */
            /* O zoom de 1.15 mata as barras pretas laterais e de topo */
            transform: translate(-50%, -50%) scale(1.15); 
            border: 0;
        }

        .footer {
            text-align: center;
            padding: 24px 20px;
            font-size: 0.85rem;
            color: var(--text-muted);
            background-color: var(--bg-color);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            margin-top: auto;
        }

        /* --- RESPONSIVIDADE PC PREMIUM --- */
        @media (min-width: 1024px) {
            .thank-you-section { padding: 60px 0; }
            .brand-logo { max-height: 100px; }
            .thank-you-section h1 { font-size: 3.5rem; }
            .thank-you-section p.subtitle { font-size: 1.3rem; max-width: 800px; }
            
            /* No PC o vídeo ganha largura para não ficar "tripinha" */
            .video-container { 
                max-width: 420px; 
                padding-bottom: 140%; /* Proporção levemente ajustada para telas largas */
            } 
            .cta-button { max-width: 420px; font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <main class="thank-you-section">
        <div class="container fade-in">
            <img src="https://i.ibb.co/fdMzL02L/logo.webp" alt="Logo Studio Luna" class="brand-logo">
            
            <h1>Obrigado pela confiança! 🎉</h1>
            
            <p class="subtitle">
                Seu pagamento foi aprovado. <br>
                <span class="highlight-text">Assista ao vídeo abaixo</span> para liberar o próximo passo do seu ensaio.
            </p>
            
            <div class="video-container">
                <iframe src="https://www.youtube.com/embed/Ae-78sMQxF4?si=X9_fv-uoXWfaL5bA&rel=0&modestbranding=1&controls=0&showinfo=0" title="Instruções Studio Luna" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
            </div>

            <a href="https://wa.me/5511921824150?text=Ol%C3%A1!%20Acabei%20de%20fazer%20o%20pagamento%20do%20meu%20ensaio%20de%20formatura%20e%20assisti%20ao%20v%C3%ADdeo." 
               id="whatsapp-btn" class="cta-button disabled" target="_blank">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.82 9.82 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg>
                <span id="btn-text">ASSISTA AO VÍDEO PARA LIBERAR</span>
            </a>
        </div>
    </main>

    <footer class="footer">
        2026 &copy; CNPJ: 65.135.920/0001-62<br>Studio Luna. Todos os direitos reservados.
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <script>
        window.addEventListener('load', function() {
            setTimeout(function() {
                var count = 300; 
                var defaults = { origin: { y: 0.7 }, colors: ['#10B981', '#d8b4fe', '#ffffff', '#3b82f6'], zIndex: 9999 };
                function fire(particleRatio, opts) { confetti(Object.assign({}, defaults, opts, { particleCount: Math.floor(count * particleRatio) })); }
                fire(0.25, { spread: 26, startVelocity: 65 }); fire(0.2, { spread: 60 }); fire(0.35, { spread: 100, decay: 0.91, scalar: 0.8 });
            }, 50);
        });

        const btn = document.getElementById('whatsapp-btn');
        const btnText = document.getElementById('btn-text');
        setTimeout(() => { 
            btn.classList.remove('disabled'); 
            btnText.innerText = 'CHAMAR ESPECIALISTA NO WHATSAPP'; 
        }, 30000);

        const observerOptions = { threshold: 0.15 };
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('visible'); });
        }, observerOptions);
        document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
    </script>
</body>
</html>
