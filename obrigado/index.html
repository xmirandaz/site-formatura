<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obrigado! | Studio Luna</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0f0f0f;
            --purple-dark: #1f0b3b;
            --purple-glow: rgba(62, 22, 117, 0.5);
            --cta-green: #25D366; /* Verde oficial do WhatsApp */
            --cta-green-hover: #1EBE5D;
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Classes Utilitárias e Animações */
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 20px;
            width: 100%;
        }

        .fade-in {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
        }

        .fade-in.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Botão do WhatsApp */
        .cta-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            max-width: 400px;
            background-color: var(--cta-green);
            color: white;
            font-weight: 800;
            font-size: 1.1rem;
            text-align: center;
            padding: 18px 24px;
            border-radius: 8px;
            text-decoration: none;
            border: none;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.2s, box-shadow 0.3s;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 40px;
        }

        .cta-button:hover {
            background-color: var(--cta-green-hover);
            transform: scale(1.02);
            box-shadow: 0 6px 20px rgba(37, 211, 102, 0.4);
        }

        .cta-button svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        /* Seção Principal de Obrigado */
        .thank-you-section {
            padding: 40px 0; 
            text-align: center;
            background: radial-gradient(circle at top, var(--purple-dark) 0%, var(--bg-color) 70%);
            flex: 1; /* Faz a seção empurrar o footer para baixo caso a tela seja muito grande */
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .brand-logo {
            max-height: 50px;
            width: auto;
            margin-bottom: 30px; 
            display: inline-block;
        }

        .thank-you-section h1 {
            font-size: 2.5rem;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 16px; 
            background: linear-gradient(to right, #fff, #d8b4fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .thank-you-section p.subtitle {
            font-size: 1.1rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 30px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .highlight-text {
            color: #fff;
            font-weight: 600;
        }

        /* Container do Vídeo (Proporção 16:9 perfeita para YouTube/Vimeo) */
        .video-container {
            position: relative;
            padding-bottom: 56.25%; /* Mantém proporção 16:9 */
            height: 0;
            overflow: hidden;
            max-width: 100%;
            background: #1a1a1a;
            border-radius: 12px;
            margin-bottom: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px var(--purple-glow);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .video-container iframe, 
        .video-container video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
            border-radius: 12px;
        }

        /* Texto placeholder caso você não tenha colocado o iframe ainda */
        .video-placeholder-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: var(--text-muted);
            font-size: 1rem;
            text-align: center;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 24px 20px;
            font-size: 0.85rem;
            color: var(--text-muted);
            background-color: var(--bg-color);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            margin-top: auto;
        }

        /* Responsividade */
        @media (max-width: 600px) {
            .thank-you-section h1 { font-size: 2rem; }
            .thank-you-section p.subtitle { font-size: 1rem; }
        }
    </style>
</head>
<body>

    </footer>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <script>
        // --- CONFIGURAÇÃO DO ESTOURO DE CONFETES ---
        window.addEventListener('load', function() {
            setTimeout(function() {
                var count = 300; 
                var defaults = {
                    origin: { y: 0.75 }, 
                    colors: ['#10B981', '#10B981', '#10B981', '#d8b4fe', '#ffffff', '#3b82f6'],
                    zIndex: 9999
                };

                function fire(particleRatio, opts) {
                    confetti(Object.assign({}, defaults, opts, {
                        particleCount: Math.floor(count * particleRatio)
                    }));
                }

                fire(0.25, { spread: 26, startVelocity: 65 }); 
                fire(0.2, { spread: 60 });
                fire(0.35, { spread: 100, decay: 0.91, scalar: 0.8 });
                fire(0.1, { spread: 120, startVelocity: 35, decay: 0.92, scalar: 1.2 });
                fire(0.1, { spread: 120, startVelocity: 55 });
            }, 300);
        });

        // --- OBSERVER PARA FADE IN ---
        const observerOptions = {
            root: null,
            rootMargin: '0px',
            threshold: 0.15
        };

        const observer = new IntersectionObserver((entries, observer) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                    observer.unobserve(entry.target);
                }
            });
        }, observerOptions);

        document.querySelectorAll('.fade-in').forEach(element => {
            observer.observe(element);
        });
    </script>
</body>
</html>
